<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background-color: white; /* Or black, depending on your vibe */
      color: black;
      text-align: center;
      padding: 20px;
    }

    .back-button {
  display: inline-block;
  margin: 20px 0;
  color: hotpink;
  font-size: 14px;
  border: 1px solid white; /* Adds a thin frame */
  padding: 10px 20px;
  transition: 0.3s;
}

    .back-button:hover {
  background-color: white;
  color: white; /* Flips the colors when you touch it */
  cursor: crosshair;
}
    /* THE MAGIC: This container makes images sit in a row */
    .gallery-container {
  display: flex;       /* Flexbox is the best way to align things */
  flex-wrap: wrap;     /* If they run out of space, they start a new row */
  justify-content: center; /* Centers the whole row */
  gap: 15px;           /* Puts a nice gap between the photos */
    }

    /* THE PHOTOS: Set a specific size here */
    .gallery-container img {
  width: 200px;        /* Change this number to make them bigger or smaller */
  height: 150px;       /* Keeps them all the same height for a clean look */
  object-fit: cover;   /* Crops the images slightly so they don't look squished */
  transition: 0.3s;
  cursor: crosshair;
    }

    /* THE INVERT: Still here for your mouse-over effect */
    .gallery-container img:hover {
  filter: invert(1);
    }
  </style>
  <link rel="icon" type="image/png" href="oma table copy.png">

</head>
