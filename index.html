  <style>
    /* Basic Typography */
    h1, h2, h3, h4, h5, h6 { 
      margin: 5px 0; 
    }

    /* Container to keep buttons in a horizontal row */
    .button-container {
      display: flex;
      justify-content: center; /* Centers the group of buttons */
      gap: 20px;               /* Space between each button */
      margin: 40px auto;       /* Space above and below the row */
    }

    /* Styling for the button images */
    .my-photo { 
      width: 150px; 
      height: auto; 
      transition: 0.3s; 
      display: inline-block;
    }

    /* Interactive hover effect: colors flip when mouse touches them */
    .my-photo:hover { 
      filter: invert(1) !important;
      cursor: pointer; /* Ensures the standard "hand" icon appears */
    }
  </style>
</head>
